name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_123 }}

      - name: Run shell script on server
        run: |
          ssh -o StrictHostKeyChecking=no root@123.249.31.52 'bash -s' < /root/app/github-actions/website.sh
